          cmd: "powershell -ExecutionPolicy Bypass -File \"$env:USERPROFILE\\espanso-utility\\cloudinary-clear-core.ps1\" -OlderThanDays 0"

  # Delete Cloudinary resources older than N days — :cloudinary-7-clear / :cloudinary-30-clear
  - regex: ":cloudinary-(?P<days>\\d+)-clear"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "powershell -ExecutionPolicy Bypass -File \"$env:USERPROFILE\\espanso-utility\\cloudinary-clear-core.ps1\" -OlderThanDays {{days}}"
  
