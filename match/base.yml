matches:
  # Welcome message
  - trigger: ":wttt"
    replace: "Welcome to the team ❤️"

  # WHOAMI (Windows user)
  - trigger: ":whoami"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "whoami"

  # Current date (15th Aug 2026 format)
  - trigger: ":date"
    replace: "{{mydate}}"
    vars:
      - name: mydate
        type: date
        params:
          format: "%dth %b %Y"

  # Random Nepal phone number (97 or 98) - 10 digits
  - trigger: ":phone"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "powershell -Command \"& '$env:USERPROFILE\\espanso-utility\\espanso-phone.bat'\""

  # Random Nepal phone number with country code +977
  - trigger: ":npphone"
    replace: "977{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "powershell -Command \"& '$env:USERPROFILE\\espanso-utility\\espanso-phone.bat'\""

  # Random First Name
  - trigger: ":name"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "powershell -Command \"& '$env:USERPROFILE\\espanso-utility\\espanso-firstname.bat'\""

  # Random Last Name
