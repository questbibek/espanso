  # Ubuntu command
  - trigger: ":ubuntu"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "powershell -ExecutionPolicy Bypass -File \"$env:USERPROFILE\\espanso-utility\\espanso-ubuntu.ps1\""

  # Upload file (Ctrl+C in Explorer anywhere) to Cloudflare R2 → pastes link
  - trigger: ":r2upload"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "powershell -ExecutionPolicy Bypass -File \"$env:USERPROFILE\\espanso-utility\\r2-upload.ps1\""

  # Delete object matching Ctrl+C'd filename from R2 bucket
  - trigger: ":r2delete"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "powershell -ExecutionPolicy Bypass -File \"$env:USERPROFILE\\espanso-utility\\r2-delete.ps1\""

  # Delete ALL objects in the bucket
  - trigger: ":r2-clear-all"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "powershell -ExecutionPolicy Bypass -File \"$env:USERPROFILE\\espanso-utility\\r2-clear-core.ps1\" -OlderThanDays 0"

  # Delete objects older than N days — usage: :r2-7-clear / :r2-30-clear / :r2-61-clear
  # Note: {{days}} is injected directly from the regex capture group into the cmd
  - regex: ":r2-(?P<days>\\d+)-clear"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "powershell -ExecutionPolicy Bypass -File \"$env:USERPROFILE\\espanso-utility\\r2-clear-core.ps1\" -OlderThanDays {{days}}"

  # Upload file(s) (Ctrl+C in Explorer) to Cloudinary → pastes link(s)
  - trigger: ":cloudinaryupload"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "powershell -ExecutionPolicy Bypass -File \"$env:USERPROFILE\\espanso-utility\\cloudinary-upload.ps1\""

  # Delete file(s) (Ctrl+C in Explorer) from Cloudinary by public_id
  - trigger: ":cloudinarydelete"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "powershell -ExecutionPolicy Bypass -File \"$env:USERPROFILE\\espanso-utility\\cloudinary-delete.ps1\""

