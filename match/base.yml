matches:

  # ── Test ────────────────────────────────────────────────────────────────────

  - trigger: ":wttt"
    replace: "Welcome to the team ❤️"

  # ── Personal Info ────────────────────────────────────────────────────────────

  - trigger: ":bibek@v"
    replace: "bibek@vrittechnologies.com"

  - trigger: ":maptovrit"
    replace: |
      Vrit Technologies HQ Office
      Sankhamul, New Baneshwor
      Near NIC Asia Bank and Prabhu Bank
      Get Exact Direction from google maps: https://maps.app.goo.gl/EQY0nWKzzsrLACSyg

  - trigger: ":maptoskill"
    replace: |
      Skill Shikshya Office
      Sankhamul, New Baneshwor
      Near NIC Asia Bank and Prabhu Bank
      Get Exact Direction from google maps: https://maps.app.goo.gl/Cvra5dqFZdU1ZJyJE

  # ── Date & System ────────────────────────────────────────────────────────────

  - trigger: ":date"
    replace: "{{mydate}}"
    vars:
      - name: mydate
        type: date
        params:
          format: "%dth %b %Y"

  - trigger: ":whoami"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "whoami"

  # ── Passwords ────────────────────────────────────────────────────────────────

  - trigger: ":password"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "openssl rand -base64 24 | tr -d '=+/' | cut -c1-16"

  - regex: ":pass,(?P<length>\\d+) "
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "openssl rand -base64 48 | tr -d '=+/' | cut -c1-{{length}}"

  # ── Random Data ──────────────────────────────────────────────────────────────

  - trigger: ":phone"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "bash $HOME/espanso-utility/espanso-phone.sh"

  - trigger: ":npphone"
    replace: "977{{output}}"
